<html ng-app='TabsApp'>
<head>

    <title>Parts Department</title>
   
    <script src='./scripts/angularjs.js'></script>
    <!-- script src='./scripts/angularjs.min.js'></script -->
    <script src='./scripts/bootstrap.bundle.min.js.js'></script>
    <script src='./scripts/angular-cookies.js'></script>
 
    <script src='./scripts/index.js'></script>

    <script src='./scripts/Filters.js'></script>
    <script src='./scripts/UtilityFunctions.js'></script>

    <!-- Stage Tab Controller-->
    <script src='./scripts/Stage.js'></script>
    <script src='./scripts/Stage_Car.js'></script>
 
    <!-- Production Tab Controllers -->
    <script src='./scripts/Production.js'></script>
    <script src='./scripts/Estimator_View.js'></script>
    <script src='./scripts/Technician_View.js'></script>

    <!-- Deliveries Tab Controllers -->
    <script src='./scripts/Deliveries.js'></script>
    <script src='./scripts/DeliveriesByCar.js'></script>
    <script src='./scripts/DeliveriesByVendor.js'></script>

    <!-- Parts Search Tab Controller-->
    <script src='./scripts/Parts_Search.js'></script>

    <!-- Materials Ordering Tab Controller-->
    <script src='./scripts/Order_Materials.js'></script>

    <!-- Unordered Parts Screen Controller-->
    <!-- script src='./scripts/Unordered_Parts.js'></script -->

    <!-- Follow-Up Tab Controller-->
    <script src="./scripts/Follow_Up.js"></script>

    <!-- Return Forms Tab Controller-->
    <script src='./scripts/Return_Forms.js'></script>

    <!-- Vendors List Tab Controller-->
    <script src='./scripts/Vendors.js'></script>

    <!-- Universal Style Sheet -->
    <link rel="stylesheet" href="./styles/Parts.css">
    <link rel="stylesheet" href="./styles/bootstrap.min.css">

</head>
<body ng-controller='TabsController' style="background-color: lightgrey;">
    <table border='1' width='100%'>
        <tr>
            <td colspan="3" align='left'>
                <b>Today's Date:</b> <u>{{ dateToday }}</u>
            </td>
            <td align='center' colspan="2">
                <h4 class="red">Shop:</h4>
                <select ng-model='locationID' class="form-select">
                    <option ng-repeat='loc in locations' value='{{ loc.id }}'>{{ loc.location }}</option>
                </select>
                <br/>
            </td>
            <td colspan='3' align='right'>
                <b>Data last updated:</b> {{ last_update }}
                <br>
                <button class="btn btn-danger" ng-click='Logout();'>Logout</button>
            </td>
        </tr>
        <tr role='button' class="heading">
            <td ng-class='Tabs.Stage' ng-click='PickTab("Stage");' align="center" width="12.5%" class="whiteBorders">
                Stage
            </td>
            <td ng-class='Tabs.Production' ng-click='PickTab("Production");' align="center" width="12.5%" class="whiteBorders">
                Production
            </td>
            <td ng-class='Tabs.Deliveries' ng-click='PickTab("Deliveries");' align="center" width="12.5%" class="whiteBorders">
                Deliveries
            </td>
            <td ng-class='Tabs.PartsSearch' ng-click='PickTab("PartsSearch");' align="center" width="12.5%" class="whiteBorders">
                Parts Search
            </td>
            <td ng-class='Tabs.Materials' ng-click='PickTab("Materials");' align="center" width="12.5%" class="whiteBorders">
                Materials
            </td>
            <td ng-class='Tabs.FollowUp' ng-click='PickTab("FollowUp");' align="center" width="12.5%" class="whiteBorders">
                Follow-Up
            </td>
            <td ng-class='Tabs.ReturnForms' ng-click='PickTab("ReturnForms");' align="center" width="12.5%" class="whiteBorders">
                Return Forms
            </td>
            <td ng-class='Tabs.Vendors' ng-click='PickTab("Vendors");' align="center" width="12.5%" class="whiteBorders">
                Vendors
            </td>
        </tr>
    </table>
    <div ng-include='tabView'></div>
</body>
</html>
